<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BABAYAGA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --green:#00ff66;
    --green-dim:#00cc55;
    --black:#000000;
    --panel:#0a0f0c;
    --border:#163322;
    --grey:#7d9488;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--black);font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;}
  body{min-height:100vh;min-height:100dvh;}

  /* ---------- LOADING ---------- */
  #loading{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;}
  .logo-ring{width:120px;height:120px;border:3px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(0,255,102,.5);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 18px rgba(0,255,102,.4);}50%{box-shadow:0 0 36px rgba(0,255,102,.8);}}
  .logo-letter{font-size:56px;font-weight:900;color:var(--green);font-family:Georgia,serif;font-style:italic;}
  .brand-name{font-size:30px;font-weight:900;letter-spacing:4px;color:var(--green);text-shadow:0 0 14px rgba(0,255,102,.7);}
  .loading-sub{color:var(--grey);font-size:12px;}
  .progress-bar{width:200px;height:5px;background:#0d1310;border-radius:4px;overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green-dim),var(--green));transition:width .3s;}
  #loading.hidden{display:none;}

  /* ---------- TOP BAR ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:5;}
  .topbar .brand b{color:var(--green);font-size:17px;letter-spacing:1.5px;}
  .topbar .brand span{display:block;color:var(--grey);font-size:9px;letter-spacing:2px;margin-top:1px;}
  .counter-pill{background:#0d1310;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--green);font-weight:700;}

  /* ---------- CONTENT ---------- */
  .content{padding:14px 14px 110px;}
  .hint{color:var(--grey);font-size:11px;line-height:1.6;margin-bottom:14px;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;}

  .input-section{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .input-label{color:var(--grey);font-size:10px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
  .input-group{display:flex;gap:8px;}
  input[type="text"]{flex:1;background:#050805;border:1px solid var(--border);border-radius:6px;padding:10px;color:#fff;font-size:12px;}
  input[type="text"]::placeholder{color:#3d4d44;}
  input[type="text"]:focus{outline:none;border-color:var(--green);}
  .btn-paste{padding:10px 14px;border:1px solid var(--border);background:#0d1a12;color:var(--green);border-radius:6px;font-weight:600;font-size:12px;}

  .match-list{margin-bottom:14px;}
  .match-item{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
  .match-item.processing{border-color:var(--green-dim);}
  .match-teams{font-size:14px;font-weight:700;color:#fff;}
  .match-meta{color:var(--grey);font-size:10px;margin-top:4px;}
  .match-status{color:var(--grey);font-size:10px;margin-top:6px;}
  .match-status.success{color:var(--green);}
  .match-status.error{color:#ff6b6b;}
  .match-status.loading{color:#ffc107;animation:blink .8s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.5;}}

  .cta-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:linear-gradient(0deg,var(--black) 65%,transparent);}
  .btn-primary{width:100%;padding:15px;border:none;border-radius:10px;background:var(--green);color:#000;font-weight:800;font-size:15px;letter-spacing:.5px;}
  .btn-primary:disabled{background:#1a2a20;color:#4a5a50;}

  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo-ring"><div class="logo-letter">B</div></div>
  <div class="brand-name">BABAYAGA</div>
  <div class="loading-sub" id="loadingMsg">Initializing BABAYAGA...</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- PAGE 1 -->
<div class="topbar">
  <div class="brand"><b>BABAYAGA</b><span>VOF SYSTEMS — SPORTYBET LINK INPUT</span></div>
  <div class="counter-pill" id="counterPill">0 matches</div>
</div>

<div class="content">
  <div class="hint">Paste SportyBet match links below. Each link will automatically extract teams, fetch Sofascore data, and pull odds from the rendered page.</div>

  <div class="input-section">
    <div class="input-label">SportyBet Match Link</div>
    <div class="input-group">
      <input type="text" id="linkInput" placeholder="Paste SportyBet link..." oninput="onLinkInput()">
      <button class="btn-paste" onclick="addMatch()">ADD</button>
    </div>
  </div>

  <div class="match-list" id="matchList"></div>
</div>

<div class="cta-bar">
  <button class="btn-primary" id="analyzeBtn" disabled onclick="runAnalyze()">ANALYZE</button>
</div>

<script>
const ILOVEAPI_PUBLIC_KEY = 'project_public_435c37dac7fae911c837a1963c88d8eb_kr1d61388b7bc5ac7169fc3b302fc77851a0c';
let matchData = {};
let matchCounter = 0;

function onLinkInput(){
  const val = document.getElementById('linkInput').value.trim();
  document.getElementById('linkInput').value = val;
}

async function addMatch(){
  const val = document.getElementById('linkInput').value.trim();
  if(!val) return;

  const parsed = parseSportyBetLink(val);
  if(!parsed){
    alert('Invalid SportyBet link. Check format.');
    return;
  }

  matchCounter++;
  const slotId = matchCounter;
  matchData[slotId] = {
    slot: slotId,
    url: val,
    teams: parsed.teams,
    league: parsed.league,
    country: parsed.country,
    status: 'processing'
  };

  renderMatch(slotId);
  document.getElementById('linkInput').value = '';
  updateCounter();

  // Start async processing — don't block UI
  processMatchAsync(slotId, parsed);
}

function parseSportyBetLink(url){
  // Pattern: sportybet.com/*/sport/SPORT/COUNTRY/LEAGUE/TEAM1_vs_TEAM2/sr:match:ID
  const match = url.match(/sport\/(\w+)\/([^/]+)\/([^/]+)\/([^_]+)_vs_([^/]+)\/sr:match:(\d+)/);
  if(!match) return null;
  return {
    sport: match[1],
    country: match[2],
    league: match[3],
    team1: match[4].replace(/_/g, ' '),
    team2: match[5].replace(/_/g, ' '),
    teams: [match[4].replace(/_/g, ' '), match[5].replace(/_/g, ' ')],
    league: match[3],
    country: match[2]
  };
}

async function processMatchAsync(slotId, parsed){
  try{
    updateMatchStatus(slotId, 'Searching Sofascore...');
    const eventId = await searchSofascoreEvent(parsed.teams[0], parsed.teams[1], parsed.league);
    if(!eventId) throw new Error('Match not found on Sofascore');

    matchData[slotId].eventId = eventId;

    updateMatchStatus(slotId, 'Fetching enrichment...');
    await enrichMatchData(slotId, eventId);

    updateMatchStatus(slotId, 'Converting odds PDF...');
    const pdfData = await convertToPDF(matchData[slotId].url);
    if(!pdfData) throw new Error('PDF conversion failed');

    matchData[slotId].pdfData = pdfData;

    updateMatchStatus(slotId, 'Extracting odds...');
    const odds = await extractOddsFromPDF(pdfData);
    if(odds) matchData[slotId].odds = odds;

    matchData[slotId].status = 'success';
    updateMatchStatus(slotId, 'Ready for analysis');

  } catch(err){
    matchData[slotId].status = 'error';
    updateMatchStatus(slotId, `Error: ${err.message}`);
  }
  updateCounter();
}

async function searchSofascoreEvent(team1, team2, league){
  try{
    // Search for team1
    const res1 = await fetch(`https://api.sofascore.com/api/v1/search/all?q=${encodeURIComponent(team1)}`);
    const json1 = await res1.json();
    if(!json1.results || !json1.results.length) return null;

    // Find the team result that matches league
    const teamResult = json1.results.find(r => r.entity && r.entity.team && r.entity.team.name.toLowerCase() === team1.toLowerCase());
    if(!teamResult || !teamResult.entity.team) return null;

    const teamId = teamResult.entity.team.id;

    // Get upcoming events for this team
    const resEvents = await fetch(`https://api.sofascore.com/api/v1/team/${teamId}/events/last/0`);
    const jsonEvents = await resEvents.json();
    if(!jsonEvents.events) return null;

    // Find the event that matches both team names
    for(const ev of jsonEvents.events){
      const home = ev.homeTeam ? ev.homeTeam.name.toLowerCase() : '';
      const away = ev.awayTeam ? ev.awayTeam.name.toLowerCase() : '';
      const t1Lower = team1.toLowerCase();
      const t2Lower = team2.toLowerCase();

      if((home === t1Lower && away === t2Lower) || (home === t2Lower && away === t1Lower)){
        return ev.id;
      }
    }

    return null;
  } catch(err){
    return null;
  }
}

async function enrichMatchData(slotId, eventId){
  try{
    const promises = [
      fetch(`https://api.sofascore.com/api/v1/event/${eventId}`),
      fetch(`https://api.sofascore.com/api/v1/event/${eventId}/standings/total`),
      fetch(`https://api.sofascore.com/api/v1/event/${eventId}/h2h`),
      fetch(`https://api.sofascore.com/api/v1/event/${eventId}/lineups`)
    ];

    const responses = await Promise.all(promises);
    const [eventRes, standingsRes, h2hRes, lineupsRes] = responses;

    if(eventRes.ok){
      const eventJson = await eventRes.json();
      const ev = eventJson.event || {};
      matchData[slotId].home = ev.homeTeam ? ev.homeTeam.name : null;
      matchData[slotId].away = ev.awayTeam ? ev.awayTeam.name : null;
      matchData[slotId].tournament = ev.tournament ? ev.tournament.name : null;
      matchData[slotId].startTimestamp = ev.startTimestamp;
      matchData[slotId].venue = ev.venue ? ev.venue.name : null;
      matchData[slotId].homeTeamId = ev.homeTeam ? ev.homeTeam.id : null;
      matchData[slotId].awayTeamId = ev.awayTeam ? ev.awayTeam.id : null;
    }

    if(standingsRes.ok){
      const standingsJson = await standingsRes.json();
      matchData[slotId].standingsRaw = standingsJson;
    }

    if(h2hRes.ok){
      const h2hJson = await h2hRes.json();
      if(h2hJson.teamDuel){
        const homeWins = h2hJson.teamDuel.homeWins || 0;
        const awayWins = h2hJson.teamDuel.awayWins || 0;
        const draws = h2hJson.teamDuel.draws || 0;
        const total = homeWins + awayWins + draws;
        matchData[slotId].h2hCount = total;
        matchData[slotId].h2hHomeWinRate = total ? homeWins / total : null;
        matchData[slotId].h2hAwayWinRate = total ? awayWins / total : null;
      }
    }

    if(lineupsRes.ok){
      const lineupsJson = await lineupsRes.json();
      if(lineupsJson.confirmed){
        const summarizeTeam = (teamBlock) => {
          if(!teamBlock) return { formation: null, avgRating: null, missingCount: null, injuryImpact: null };
          const starters = (teamBlock.players || []).filter(p => !p.substitute);
          const ratings = starters.map(p => p.statistics && p.statistics.rating).filter(r => typeof r === 'number');
          const avgRating = ratings.length ? parseFloat((ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(2)) : null;
          const missing = teamBlock.missingPlayers || [];
          const marketValues = missing.map(m => m.player && m.player.proposedMarketValueRaw ? m.player.proposedMarketValueRaw.value : 0);
          const lostValue = marketValues.reduce((a,b)=>a+b,0);
          const allPlayers = teamBlock.players || [];
          const totalSquadValue = allPlayers.reduce((sum,p)=> sum + (p.player && p.player.proposedMarketValueRaw ? p.player.proposedMarketValueRaw.value : 0), 0);
          const injuryImpact = totalSquadValue > 0 ? Math.min(0.6, lostValue / totalSquadValue) : null;
          return { formation: teamBlock.formation, avgRating, missingCount: missing.length, injuryImpact };
        };
        const home = summarizeTeam(lineupsJson.home);
        const away = summarizeTeam(lineupsJson.away);
        matchData[slotId].lineupConfirmed = true;
        matchData[slotId].homeFormation = home.formation;
        matchData[slotId].awayFormation = away.formation;
        matchData[slotId].homeAvgRating = home.avgRating;
        matchData[slotId].awayAvgRating = away.avgRating;
        matchData[slotId].homeMissingCount = home.missingCount;
        matchData[slotId].awayMissingCount = away.missingCount;
        matchData[slotId].homeInjuryImpact = home.injuryImpact;
        matchData[slotId].awayInjuryImpact = away.injuryImpact;
      }
    }

    // Fetch form data for both teams
    if(matchData[slotId].homeTeamId && matchData[slotId].awayTeamId){
      const formPromises = [
        fetchTeamLast10(matchData[slotId].homeTeamId),
        fetchTeamLast10(matchData[slotId].awayTeamId)
      ];
      const [homeEvents, awayEvents] = await Promise.all(formPromises);
      if(homeEvents) matchData[slotId].homeForm = summarizeForm(homeEvents, matchData[slotId].homeTeamId);
      if(awayEvents) matchData[slotId].awayForm = summarizeForm(awayEvents, matchData[slotId].awayTeamId);
    }

  } catch(err){
    // Enrichment failures are non-fatal
  }
}

async function fetchTeamLast10(teamId){
  try{
    const res = await fetch(`https://api.sofascore.com/api/v1/team/${teamId}/events/last/0`);
    if(!res.ok) return null;
    const json = await res.json();
    if(!json.events) return null;
    return json.events.slice().sort((a,b)=>(b.startTimestamp||0)-(a.startTimestamp||0)).slice(0,10);
  } catch(err){
    return null;
  }
}

function summarizeForm(events, teamId){
  if(!events || events.length === 0) return null;
  const perGame = events.map(ev=>{
    const isHome = ev.homeTeam && ev.homeTeam.id === teamId;
    const gf = isHome ? (ev.homeScore && ev.homeScore.current) : (ev.awayScore && ev.awayScore.current);
    const ga = isHome ? (ev.awayScore && ev.awayScore.current) : (ev.homeScore && ev.homeScore.current);
    let points = null;
    if(typeof gf === 'number' && typeof ga === 'number') points = gf > ga ? 3 : (gf === ga ? 1 : 0);
    return { gf, ga, points, timestamp: ev.startTimestamp || null };
  }).filter(g => g.points !== null);
  if(perGame.length === 0) return null;
  const currentGames = perGame.slice(0, 5);
  const leagueGames = perGame.slice(5, 10);
  const avgPoints = (arr) => arr.length ? arr.reduce((a,b)=>a+b.points,0)/arr.length : null;
  return {
    currentPPG: avgPoints(currentGames),
    leaguePPG: leagueGames.length ? avgPoints(leagueGames) : avgPoints(currentGames),
    lastMatchTimestamp: perGame[0].timestamp,
    gamesCounted: perGame.length
  };
}

async function convertToPDF(sportyBetUrl){
  try{
    const formData = new FormData();
    formData.append('url', sportyBetUrl);

    const res = await fetch('https://api.ilovepdf.com/v1/html2pdf', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${ILOVEAPI_PUBLIC_KEY}`
      },
      body: formData
    });

    if(!res.ok) return null;
    const blob = await res.blob();
    return blob;
  } catch(err){
    return null;
  }
}

async function extractOddsFromPDF(pdfBlob){
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const arrayBuffer = await pdfBlob.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for(let p = 1; p <= pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      fullText += content.items.map(i => i.str).join(' ') + '\n';
    }
    return parseOddsText(fullText);
  } catch(err){
    return null;
  }
}

function parseOddsText(text){
  const odds = {};
  // 1X2
  let m = text.match(/1X2[\s\S]{0,60}?Home\s*([\d.]+)\s*Draw\s*([\d.]+)\s*Away\s*([\d.]+)/i);
  if(m) odds.home1x2=parseFloat(m[1]), odds.draw1x2=parseFloat(m[2]), odds.away1x2=parseFloat(m[3]);
  // Over/Under 2.5
  m = text.match(/Over\/Under[\s\S]{0,40}?2\.5[\s\S]{0,30}?([\d.]+)\s*[\s\S]{0,10}?([\d.]+)/i);
  if(m) odds.over25=parseFloat(m[1]), odds.under25=parseFloat(m[2]);
  // BTTS
  m = text.match(/GG\/NG[\s\S]{0,40}?Yes\s*([\d.]+)\s*No\s*([\d.]+)/i);
  if(m) odds.bttsYes=parseFloat(m[1]), odds.bttsNo=parseFloat(m[2]);
  // Handicap
  m = text.match(/Handicap[\s\S]{0,60}?([\d.]+)\s*([\d.]+)\s*([\d.]+)/i);
  if(m) odds.handicapHome=parseFloat(m[1]), odds.handicapDraw=parseFloat(m[2]), odds.handicapAway=parseFloat(m[3]);
  // Team-specific O/U
  const teamOU = [...text.matchAll(/([\w\s]+?)\s+Over\/Under[\s\S]{0,15}?([\d.]+)[\s\S]{0,15}?([\d.]+)\s*([\d.]+)/gi)];
  if(teamOU.length >= 2){
    odds.homeTeamOver=parseFloat(teamOU[0][3]), odds.homeTeamUnder=parseFloat(teamOU[0][4]);
    odds.awayTeamOver=parseFloat(teamOU[1][3]), odds.awayTeamUnder=parseFloat(teamOU[1][4]);
  }
  return Object.keys(odds).length ? odds : null;
}

function renderMatch(slotId){
  const m = matchData[slotId];
  const el = document.createElement('div');
  el.className = 'match-item processing';
  el.id = `match-${slotId}`;
  el.innerHTML = `
    <div class="match-teams">${m.teams[0]} vs ${m.teams[1]}</div>
    <div class="match-meta">${m.league || ''} • ${m.country || ''}</div>
    <div class="match-status loading" id="status-${slotId}">Processing...</div>
  `;
  document.getElementById('matchList').appendChild(el);
}

function updateMatchStatus(slotId, msg){
  const el = document.getElementById(`status-${slotId}`);
  if(el) el.textContent = msg;
}

function updateCounter(){
  const success = Object.values(matchData).filter(m => m.status === 'success').length;
  document.getElementById('counterPill').textContent = `${success} / ${Object.keys(matchData).length}`;
  document.getElementById('analyzeBtn').disabled = success === 0;
}

function runAnalyze(){
  const readyMatches = Object.values(matchData).filter(m => m.status === 'success');
  if(readyMatches.length === 0) return;
  sessionStorage.setItem('babayaga_page1_data', JSON.stringify(readyMatches));
  window.location.href = 'page2.html';
}

function runLoadingSequence(){
  const fill = document.getElementById('progressFill');
  const msg = document.getElementById('loadingMsg');
  const steps = [[30,"Initializing BABAYAGA..."],[70,"Checking session..."],[100,"Ready."]];
  let i = 0;
  const iv = setInterval(()=>{
    if(i < steps.length){
      fill.style.width = steps[i][0] + "%";
      msg.textContent = steps[i][1];
      i++;
    } else {
      clearInterval(iv);
      setTimeout(()=>{ document.getElementById('loading').classList.add('hidden'); }, 300);
    }
  }, 400);
}

window.addEventListener('load', runLoadingSequence);
</script>
</body>
</html>
